# codex-memoryd local daemon via Docker Compose.
#
#   docker compose up -d --build
#   curl http://127.0.0.1:8787/v1/status
#
# Storage persists in the named volume `codex_memoryd_data`. No secrets are
# baked into the image or this file.

services:
  codex-memoryd:
    build:
      context: .
      dockerfile: Dockerfile
    image: codex-memoryd:latest
    container_name: codex-memoryd
    # Publish only on loopback by default. Change to "8787:8787" to expose on
    # all interfaces (e.g. for devcontainers reaching the host gateway).
    ports:
      - "127.0.0.1:8787:8787"
    environment:
      # Inside the container the daemon binds all interfaces; the published
      # port restricts external reachability.
      CODEX_MEMORYD_BIND: "0.0.0.0:8787"
      CODEX_MEMORYD_DB: "/data/memory.db"
      CODEX_MEMORYD_PROFILE: "personal"
      CODEX_MEMORYD_WORKSPACE: "default"
      CODEX_MEMORYD_LOG: "info"
    volumes:
      - codex_memoryd_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8787/healthz"]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3

volumes:
  codex_memoryd_data:
