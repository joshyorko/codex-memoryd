# codex-memoryd local daemon via Docker Compose.
#
#   docker compose up -d --build
#   curl http://127.0.0.1:8787/v1/status
#
# Storage persists in the repo-local `.dogfood/memory.db`. No secrets are baked
# into the image or this file.

services:
  codex-memoryd:
    build:
      context: .
      dockerfile: Dockerfile
    image: codex-memoryd:latest
    container_name: codex-memoryd
    # Match the host user by default so the bind-mounted .dogfood SQLite files
    # remain writable by both Docker and local CLI commands. Override when
    # needed: CODEX_MEMORYD_UID=$(id -u) CODEX_MEMORYD_GID=$(id -g).
    user: "${CODEX_MEMORYD_UID:-1000}:${CODEX_MEMORYD_GID:-1000}"
    # Publish only on loopback by default. Do not change to "8787:8787" unless
    # an external authenticated proxy/tunnel protects /v1/*.
    ports:
      - "127.0.0.1:8787:8787"
    environment:
      # Inside the container the daemon binds all interfaces; the published
      # port restricts external reachability.
      CODEX_MEMORYD_BIND: "0.0.0.0:8787"
      # The `ports:` mapping below publishes only on 127.0.0.1, so the reachable
      # boundary IS loopback even though the process binds 0.0.0.0. Declare that
      # so status reports `local_only` instead of `auth_missing`. This is a
      # reporting-only flag; it does NOT loosen the HTTP /v1 transport gate,
      # which still keys off the raw (non-loopback) process bind.
      CODEX_MEMORYD_DECLARE_LOOPBACK_PUBLISH: "1"
      CODEX_MEMORYD_DB: "/data/memory.db"
      CODEX_MEMORYD_PROFILE: "personal"
      CODEX_MEMORYD_WORKSPACE: "josh-personal"
      CODEX_MEMORYD_LOG: "info"
    volumes:
      - ./.dogfood:/data
      - ${HOME}/.codex/memories:/host-codex-memories:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8787/healthz"]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3
